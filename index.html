<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoveQuest | Edición Especial</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle, #1a0b2e 0%, #0a0414 100%);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* --- PANTALLA DE BLOQUEO --- */
        .card-bloqueo {
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid #ff2a85;
            box-shadow: 0 0 20px rgba(255, 42, 133, 0.2);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            animation: flotar 4s ease-in-out infinite;
        }

        .titulo-retro {
            font-family: 'Press Start 2P', monospace;
            font-size: 16px;
            color: #00f0ff;
            text-shadow: 0 0 10px #00f0ff;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .input-clave {
            width: 100%; padding: 15px; border: 2px solid #4a2574;
            background: rgba(15, 7, 32, 0.8); border-radius: 10px;
            color: #fff; font-size: 16px; text-align: center; margin-bottom: 20px;
        }

        .btn-universal {
            width: 100%; padding: 15px; background: #ff2a85; border: none;
            border-radius: 10px; color: white; font-size: 16px; font-weight: 600;
            cursor: pointer; box-shadow: 0 0 15px #ff2a85; transition: all 0.3s ease;
        }

        .btn-universal:hover { background: #ff529c; box-shadow: 0 0 25px #ff529c; }

        /* --- CONTENEDOR DEL JUEGO --- */
        #contenedor-juego {
            display: none;
            text-align: center;
        }

        canvas {
            background: radial-gradient(circle, #15072b 0%, #05020a 100%);
            border: 3px solid #00f0ff;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.4);
            border-radius: 15px;
            display: block;
            margin: 20px auto;
        }

        /* --- PANTALLA DE CONFESIÓN --- */
        #pantalla-confesion {
            display: none;
            max-width: 500px;
            width: 90%;
            text-align: center;
            background: rgba(15, 7, 32, 0.95);
            border: 2px solid #ff2a85;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(255, 42, 133, 0.5);
            animation: entradaSuave 0.8s ease-out;
        }

        /* BARRA DE AUDIO LOCAL */
        .contenedor-audio-local {
            margin: 15px auto;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #00f0ff;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
            text-align: center;
        }

        .contenedor-audio-local p {
            font-size: 11px;
            color: #00f0ff;
            font-family: 'Press Start 2P', monospace;
        }

        .botones-decision {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 25px;
            position: relative;
            height: 60px;
        }

        .btn-decision {
            padding: 15px 30px; border: none; border-radius: 10px;
            font-size: 18px; font-weight: bold; cursor: pointer; transition: all 0.2s ease;
        }

        #btn-si { background: #00ff66; color: #000; box-shadow: 0 0 15px #00ff66; }
        #btn-si:hover { transform: scale(1.1); box-shadow: 0 0 25px #00ff66; }
        #btn-no { background: #ff3333; color: #fff; position: absolute; box-shadow: 0 0 10px #ff3333; }

        @keyframes flotar { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes entradaSuave { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <audio id="musicaFondoLocal" loop preload="auto">
        <source src="musica/musica%20love.mp3" type="audio/mpeg">
    </audio>

    <div class="card-bloqueo" id="pantalla-bloqueo">
        <h1 class="titulo-retro">ACCESO RESTRINGIDO</h1>
        <p style="margin-bottom:20px; font-size:14px; color:#e0d5f0;">Esta simulación digital está protegida. Escribe tu nombre para validar el acceso:</p>
        <input type="text" class="input-clave" id="inputClave" placeholder="Escribe tu nombre aquí (Sofia)..." autocomplete="off">
        <button class="btn-universal" onclick="verificarClave()">INICIAR PROTOCOLO</button>
    </div>

    <div id="contenedor-juego">
        <h2 class="titulo-retro" style="color: #ff2a85; text-shadow: 0 0 10px #ff2a85;">RECOLECTA LOS RECUERDOS</h2>
        <p style="font-size:11px; color:#00f0ff; margin-bottom: 5px;">Mueve con FLECHAS ← / → o toca los costados de la pantalla</p>
        <canvas id="gameCanvas" width="400" height="450"></canvas>
    </div>

    <div id="pantalla-confesion">
        <h1 class="titulo-retro" style="font-size:22px; color: #00f0ff; text-shadow: 0 0 10px #00f0ff;">¡MISIÓN COMPLETADA!</h1>
        
        <div class="contenedor-audio-local">
            <p>🎵 Reproduciendo: Musica Love</p>
        </div>

        <p id="texto-carta" style="line-height:1.8; margin-top:15px; font-size:15px; color:#fff; text-align: left; min-height: 120px;"></p>
        
        <div class="botones-decision">
            <button class="btn-decision" id="btn-si" onclick="declaracionExitosa()">¡SÍ! 💖</button>
            <button class="btn-decision" id="btn-no">NO 💔</button>
        </div>
    </div>

    <script>
        // --- CONTROL DE AUDIO RETRO DE 8 BITS ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const musicaFondo = document.getElementById("musicaFondoLocal");

        function playSound(tipo) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const ahora = audioCtx.currentTime;

            if (tipo === 'click') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(150, ahora);
                osc.frequency.exponentialRampToValueAtTime(600, ahora + 0.1);
                gain.gain.setValueAtTime(0.15, ahora); gain.gain.linearRampToValueAtTime(0, ahora + 0.1);
                osc.start(ahora); osc.stop(ahora + 0.1);
            } 
            else if (tipo === 'recolectar') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(523.25, ahora);
                osc.frequency.setValueAtTime(659.25, ahora + 0.08); osc.frequency.setValueAtTime(783.99, ahora + 0.16);
                gain.gain.setValueAtTime(0.1, ahora); gain.gain.linearRampToValueAtTime(0, ahora + 0.25);
                osc.start(ahora); osc.stop(ahora + 0.25);
            } 
            else if (tipo === 'error') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(180, ahora);
                osc.frequency.linearRampToValueAtTime(80, ahora + 0.2);
                gain.gain.setValueAtTime(0.15, ahora); gain.gain.linearRampToValueAtTime(0, ahora + 0.2);
                osc.start(ahora); osc.stop(ahora + 0.2);
            }
        }

        // --- CONTROL DE ACCESO ---
        function verificarClave() {
            const nombre = document.getElementById("inputClave").value.trim().toLowerCase();
            if (nombre === "sofia" || nombre === "sofía") {
                playSound('click');
                
                // Intento preventivo de desbloqueo exigido por navegadores
                musicaFondo.play().then(() => { musicaFondo.pause(); }).catch(e => console.log("Audio listo"));

                document.getElementById("pantalla-bloqueo").style.display = "none";
                document.getElementById("contenedor-juego").style.display = "block";
                iniciarVideojuego();
            } else {
                playSound('error');
                alert("❌ Código de acceso no reconocido.");
            }
        }

        // --- MOTOR DEL VIDEOJUEGO ---
        function iniciarVideojuego() {
            const canvas = document.getElementById("gameCanvas");
            const ctx = canvas.getContext("2d");

            const jugador = { x: 180, y: 380, width: 40, height: 40, velocidad: 8 };
            let recuerdosContador = 0;
            const objetivoRecuerdos = 3;
            let elementos = [];
            let particulas = [];
            let juegoActivo = true;
            
            let moverIzquierda = false; let moverDerecha = false;

            document.addEventListener("keydown", (e) => {
                if (e.key === "ArrowLeft") moverIzquierda = true;
                if (e.key === "ArrowRight") moverDerecha = true;
            });
            document.addEventListener("keyup", (e) => {
                if (e.key === "ArrowLeft") moverIzquierda = false;
                if (e.key === "ArrowRight") moverDerecha = false;
            });

            canvas.addEventListener("touchstart", (e) => {
                const rect = canvas.getBoundingClientRect();
                const touchX = e.touches[0].clientX - rect.left;
                if (touchX < canvas.width / 2) { moverIzquierda = true; moverDerecha = false; }
                else { moverDerecha = true; moverIzquierda = false; }
            });
            canvas.addEventListener("touchend", () => { moverIzquierda = false; moverDerecha = false; });

            function crearExplosion(x, y, color) {
                for (let i = 0; i < 15; i++) {
                    particulas.push({
                        x: x, y: y,
                        vx: (Math.random() - 0.5) * 6, vy: (Math.random() - 0.5) * 6,
                        radius: Math.random() * 4 + 2, color: color, alpha: 1
                    });
                }
            }

            function crearObjeto() {
                if (!juegoActivo) return;
                const xRandom = Math.random() * (canvas.width - 30);
                elementos.push({ x: xRandom, y: -20, size: 26, velocidad: 3.5 });
            }

            let spawner = setInterval(crearObjeto, 1000);

            function loop() {
                if (!juegoActivo) return;

                if (moverIzquierda && jugador.x > 0) jugador.x -= jugador.velocidad;
                if (moverDerecha && jugador.x < canvas.width - jugador.width) jugador.x += jugador.velocidad;

                for (let i = 0; i < elementos.length; i++) {
                    elementos[i].y += elementos[i].velocidad;

                    if (
                        elementos[i].x < jugador.x + jugador.width &&
                        elementos[i].x + elementos[i].size > jugador.x &&
                        elementos[i].y < jugador.y + jugador.height &&
                        elementos[i].y + elementos[i].size > jugador.y
                    ) {
                        playSound('recolectar');
                        crearExplosion(elementos[i].x + 13, elementos[i].y + 13, "#00f0ff");
                        elementos.splice(i, 1); 
                        recuerdosContador++; 
                        i--;

                        if (recuerdosContador >= objetivoRecuerdos) {
                            juegoActivo = false;
                            clearInterval(spawner);
                            setTimeout(terminarJuego, 500);
                            return;
                        }
                        continue;
                    }
                    if (elementos[i] && elementos[i].y > canvas.height) { elementos.splice(i, 1); i--; }
                }

                for (let i = 0; i < particulas.length; i++) {
                    particulas[i].x += particulas[i].vx; particulas[i].y += particulas[i].vy;
                    particulas[i].alpha -= 0.02;
                    if (particulas[i].alpha <= 0) { particulas.splice(i, 1); i--; }
                }

                ctx.clearRect(0, 0, canvas.width, canvas.height);

                ctx.strokeStyle = "rgba(0, 240, 255, 0.05)"; ctx.lineWidth = 1;
                for(let x=0; x<canvas.width; x+=40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke(); }
                for(let y=0; y<canvas.height; y+=40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke(); }

                ctx.fillStyle = "#ff2a85"; ctx.shadowBlur = 15; ctx.shadowColor = "#ff2a85";
                ctx.fillRect(jugador.x, jugador.y, jugador.width, jugador.height);
                ctx.fillStyle = "#fff"; ctx.font = "14px 'Press Start 2P'";
                ctx.fillText("👦", jugador.x + 8, jugador.y + 26);

                ctx.fillStyle = "#00f0ff"; ctx.shadowColor = "#00f0ff";
                for (let elem of elementos) {
                    ctx.fillRect(elem.x, elem.y, elem.size, elem.size);
                    ctx.fillStyle = "#fff"; ctx.fillText("💌", elem.x + 2, elem.y + 19);
                }

                for (let p of particulas) {
                    ctx.save(); ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color;
                    ctx.shadowBlur = 10; ctx.shadowColor = p.color; ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.fill(); ctx.restore();
                }

                ctx.shadowBlur = 0; ctx.fillStyle = "#fff"; ctx.font = "10px 'Press Start 2P'";
                ctx.fillText(`RECUERDOS: ${recuerdosContador}/${objetivoRecuerdos}`, 20, 35);

                requestAnimationFrame(loop);
            }

            function terminarJuego() {
                // Activa la reproducción local nativa al instante
                musicaFondo.play().catch(err => console.log("Error de audio:", err));
                
                document.getElementById("contenedor-juego").style.display = "none";
                document.getElementById("pantalla-confesion").style.display = "block";
                hacerEfectoEscritura("Sofía, desde que entraste a mi vida, cada momento a tu lado se convirtió en mi nivel favorito. No quiero que esto sea una simulación pasajera, quiero que hagamos el mejor equipo del mundo... Por eso, con nuestra canción sonando aquí arriba, quería preguntarte oficialmente: ¿Quieres ser mi novia?");
            }

            requestAnimationFrame(loop);
        }

        // --- EFECTO MÁQUINA DE ESCRIBIR ---
        function hacerEfectoEscritura(texto) {
            let indice = 0; const caja = document.getElementById("texto-carta"); caja.innerHTML = "";
            function paso() {
                if (indice < texto.length) {
                    caja.innerHTML += texto.charAt(indice); indice++;
                    setTimeout(paso, 45);
                }
            }
            paso();
        }

        // --- EL BOTÓN "NO" EVASIVO ---
        const btnNo = document.getElementById("btn-no");
        btnNo.style.left = "60%";

        function teletransportarBoton() {
            const nuevoX = Math.random() * (window.innerWidth - 140) + 10;
            const nuevoY = Math.random() * (window.innerHeight - 70) + 10;
            btnNo.style.position = "fixed"; btnNo.style.left = `${nuevoX}px`; btnNo.style.top = `${nuevoY}px`;
            playSound('click');
        }
        btnNo.addEventListener("mouseenter", teletransportarBoton);
        btnNo.addEventListener("touchstart", (e) => { e.preventDefault(); teletransportarBoton(); });

        // --- RESPUESTA EXITOSA ---
        function declaracionExitosa() {
            const telefonoChico = "51987654321"; 
            const recado = "¡SÍ, ACEPTO! 💖 El juego estuvo increíble y me encantó nuestra canción de fondo. ¡Eres el mejor novio! 🎮✨";
            const apiWeb = `https://api.whatsapp.com/send?phone=${telefonoChico}&text=${encodeURIComponent(recado)}`;
            window.open(apiWeb, '_blank');
        }
    </script>
</body>
</html>
